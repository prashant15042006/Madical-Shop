# Render Blueprint for MediGo API Server
services:
  - type: web
    name: medigo-api
    runtime: node
    plan: free
    buildCommand: |
      npm install -g pnpm@9
      pnpm install
      pnpm --filter @workspace/backend run build
    startCommand: pnpm --filter @workspace/backend run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: medigo-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
        # This secret is generated by Render and should not be hard-coded in source control.
    healthCheckPath: /api/healthz
    autoDeploy: true
    # Branch to deploy
    branch: main

databases:
  - name: medigo-db
    databaseName: medigo
    user: medigo
    plan: free
    ipAllowList: []
