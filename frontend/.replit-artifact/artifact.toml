kind = "mobile"
previewPath = "/"
title = "MediGo"
version = "1.0.0"
id = "frontend"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18115

[services.development]
run = "pnpm --filter @workspace/frontend run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/frontend", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/frontend", "run", "serve" ]

[services.env]
PORT = "18115"
BASE_PATH = "/"
